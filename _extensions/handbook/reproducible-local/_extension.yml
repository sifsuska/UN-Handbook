title: Reproducible Local Repository Button
version: 0.0.1
author: UN Handbook Team
quarto-required: ">=1.3.0"
contributes:
  filters:
    - reproducible-local.lua

  metadata:
    project:
      
      # Default configuration for reproducible-local button extension
      reproducible-local-config:
      
        # Repository settings
        repository:
          url: ""  # Default repository URL (should be set in project or document)
          button-text: "View Repository"
        
        # UI customization (inherits from reproducible-config if available)
        ui:
          notice-title: "Local reproduction"
          notice-description: "If you prefer, you can get the chapter files and reproduce in your own environment."
          notice-style: "full"  # "full" | "minimal" | "button-only"
        
        # Branding (uses gray by default to differentiate from ``cslovell/reproducible`` extension)
        branding:
          primary-color: "#6c757d"
          text-color: "rgb(44, 50, 63)"
          background-color: "#fafafa"
